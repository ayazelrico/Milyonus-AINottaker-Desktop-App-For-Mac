name: App CI

on:
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/app-ci.yml"
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/app-ci.yml"

jobs:
  app:
    name: macOS App
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build app placeholder
        run: |
          if find app -maxdepth 3 -name "*.xcodeproj" | grep -q .; then
            xcodebuild \
              -project app/Milyonus.xcodeproj \
              -scheme Milyonus \
              -configuration Debug \
              CODE_SIGNING_ALLOWED=NO \
              build
          else
            echo "No Xcode project present yet; app CI will run after Phase 3."
          fi
